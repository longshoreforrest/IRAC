  :root { --accent:#3232FF; --accent-strong:#1f1fcc; --bg:#fafafa; --text:#1a1f36;

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--text);
    background:radial-gradient(circle at 20% 12%,#eef2ff,transparent 50%),
               radial-gradient(circle at 80% 88%,#ecfdf5,transparent 50%),
               var(--bg);
    display:grid; place-items:center; padding:24px;
  }
  .gate{
    width:100%; max-width:420px; background:#fff;
    border:1px solid var(--border); border-radius:18px;
    padding:34px 32px;
    box-shadow:0 24px 60px rgba(15,23,42,0.08), 0 4px 12px rgba(15,23,42,0.04);

  p{color:var(--soft); font-size:13.5px; line-height:1.6; margin-bottom:14px}
  .row{display:flex; flex-direction:column; gap:8px; margin-top:14px}
  input{
    font-size:15px; padding:12px 14px;
    border:1.5px solid var(--border); border-radius:10px;
    outline:none; transition:border-color 120ms;
    background:white; color:var(--text);
  }
  input:focus{border-color:var(--accent)}
  button{
    font-size:14px; font-weight:600;
    padding:12px 14px; background:var(--accent); color:white;
    border:none; border-radius:10px; cursor:pointer; transition:background 120ms;
  }
  button:hover{background:var(--accent-strong)}
  button:disabled{opacity:.6; cursor:wait}
  .err{color:#b91c1c; font-size:12.5px; margin-top:8px; min-height:1em}
  .meta{
    margin-top:18px; padding-top:14px; border-top:1px solid var(--border);
    font-size:11px; color:var(--muted); letter-spacing:.04em;
  }
</style>

  <script>
  (() => {
    const PAYLOAD_EL = document.getElementById('payload');
    const PAYLOAD = JSON.parse(PAYLOAD_EL.textContent);
    PAYLOAD_EL.remove();

    const STORE_KEY = "irac:auth-v1:3";
    const TTL_MS = 24 * 60 * 60 * 1000;
    const td = new TextDecoder();
    const te = new TextEncoder();
    const b64dec = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));

    async function deriveKey(password, salt) {
      const baseKey = await crypto.subtle.importKey(
        'raw', te.encode(password), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 600000, hash: 'SHA-256' },
        baseKey,
        { name: 'AES-GCM', length: 256 },
        false, ['decrypt']);
    }

    async function decryptWith(password) {
      const key = await deriveKey(password, b64dec(PAYLOAD.salt));
      const pt = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: b64dec(PAYLOAD.iv) }, key,
        b64dec(PAYLOAD.ciphertext));
      return td.decode(pt);
    }

    function reveal(html) {
      document.open();
      document.write(html);
      document.close();
    }

    function getStored() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (!raw) return null;
        const o = JSON.parse(raw);
        if (!o || typeof o.p !== 'string' || typeof o.t !== 'number') return null;
        if (Date.now() - o.t > TTL_MS) { localStorage.removeItem(STORE_KEY); return null; }
        return o.p;
      } catch (e) { return null; }
    }
    function setStored(password) {
      try { localStorage.setItem(STORE_KEY, JSON.stringify({ p: password, t: Date.now() })); } catch (e) {}
    }

    const stored = getStored();
    if (stored) {
      decryptWith(stored).then(reveal).catch(() => {});
    }

    document.getElementById('f').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const btn = document.getElementById('b');
      const err = document.getElementById('err');
      const pw = document.getElementById('pw').value;
      btn.disabled = true; btn.textContent = 'Decrypting…'; err.textContent = '';
      try {
        const html = await decryptWith(pw);
        setStored(pw);
        reveal(html);
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Unlock';
        err.textContent = 'Wrong password.';
        document.getElementById('pw').select();
      }
    });
  })();
  </script>
</body>
</html>
